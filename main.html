<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ojitos hermosos</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a12;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Playfair Display', Georgia, serif;
    }

    .text {
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-style: italic;
      color: #f5e6d0;
      text-align: center;
      letter-spacing: 0.04em;
      position: relative;
      z-index: 10;
      text-shadow:
        0 0 40px rgba(255, 200, 130, 0.4),
        0 0 80px rgba(255, 160, 80, 0.2);
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>

  <canvas id="sparkles"></canvas>

  <div class="text">Ojitos hermosos los tuyos</div>

  <script>
    const canvas = document.getElementById('sparkles');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const particles = [];
    const count = 120;

    const colors = ['#ffe8a0', '#ffd06e', '#ffb347', '#fff4d6', '#ffecd2', '#ffffff'];

    class Sparkle {
      constructor() { this.reset(true); }

      reset(initial = false) {
        this.x = Math.random() * canvas.width;
        this.y = initial ? Math.random() * canvas.height : canvas.height + 10;
        this.size = Math.random() * 2.5 + 0.5;
        this.speedY = Math.random() * 0.6 + 0.2;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.opacity = Math.random();
        this.opacitySpeed = Math.random() * 0.015 + 0.005;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.twinkleOffset = Math.random() * Math.PI * 2;
        this.isStar = Math.random() > 0.6;
      }

      update() {
        this.y -= this.speedY;
        this.x += this.speedX;
        this.twinkleOffset += 0.05;
        this.opacity = 0.4 + Math.sin(this.twinkleOffset) * 0.6;

        if (this.y < -10) this.reset();
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 6;

        if (this.isStar) {
          // 4-point star
          ctx.translate(this.x, this.y);
          ctx.beginPath();
          const s = this.size * 1.8;
          for (let i = 0; i < 8; i++) {
            const angle = (i * Math.PI) / 4;
            const r = i % 2 === 0 ? s : s * 0.4;
            const px = Math.cos(angle) * r;
            const py = Math.sin(angle) * r;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }
    }

    for (let i = 0; i < count; i++) {
      particles.push(new Sparkle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
